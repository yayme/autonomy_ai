<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 210" width="820">
  <defs>
    <style>
      text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; }

      /* ── Skill bars ── */
      .bar-a {
        fill: #58a6ff;
        transform-box: fill-box;
        transform-origin: 50% 100%;
        animation: ba 10s cubic-bezier(.45,0,.55,1) infinite;
      }
      .bar-p {
        fill: #3fb950;
        transform-box: fill-box;
        transform-origin: 50% 100%;
        animation: bp 10s cubic-bezier(.45,0,.55,1) infinite;
        animation-delay: -1.5s;
      }
      .bar-m {
        fill: #bc8cff;
        transform-box: fill-box;
        transform-origin: 50% 100%;
        animation: bm 10s cubic-bezier(.45,0,.55,1) infinite;
        animation-delay: -3s;
      }
      @keyframes ba {
        0%,100% { transform: scaleY(0.88); fill: #58a6ff; }
        35%     { transform: scaleY(0.14); fill: #f85149; }
        65%     { transform: scaleY(0.56); fill: #d29922; }
      }
      @keyframes bp {
        0%,100% { transform: scaleY(0.82); fill: #3fb950; }
        35%     { transform: scaleY(0.11); fill: #f85149; }
        65%     { transform: scaleY(0.50); fill: #d29922; }
      }
      @keyframes bm {
        0%,100% { transform: scaleY(0.74); fill: #bc8cff; }
        35%     { transform: scaleY(0.07); fill: #f85149; }
        65%     { transform: scaleY(0.43); fill: #d29922; }
      }

      /* ── AI assistance bar (inverse of skills) ── */
      .bar-ai {
        fill: #3fb950;
        transform-box: fill-box;
        transform-origin: 50% 100%;
        animation: bai 10s cubic-bezier(.45,0,.55,1) infinite;
      }
      @keyframes bai {
        0%,100% { transform: scaleY(0.16); fill: #3fb950; }
        35%     { transform: scaleY(0.96); fill: #f85149; }
        65%     { transform: scaleY(0.54); fill: #d29922; }
      }

      /* ── APAI pulse rings ── */
      .ring {
        fill: none;
        stroke: #58a6ff;
        stroke-width: 1.5;
        transform-box: fill-box;
        transform-origin: 50% 50%;
        animation: ring 2.6s ease-out infinite;
        opacity: 0;
      }
      .ring2 { animation-delay: -0.87s; }
      .ring3 { animation-delay: -1.73s; }
      @keyframes ring {
        0%   { transform: scale(0.25); opacity: 0.9; }
        100% { transform: scale(2.4);  opacity: 0;   }
      }

      /* ── Flowing arrows ── */
      .flow-r {
        stroke: #58a6ff;
        stroke-width: 1.5;
        stroke-dasharray: 5 3;
        fill: none;
        animation: flo 1s linear infinite;
      }
      @keyframes flo {
        from { stroke-dashoffset: 8; }
        to   { stroke-dashoffset: 0; }
      }

      /* ── Mode labels (opacity toggle) ── */
      .lbl-full { animation: lf 10s cubic-bezier(.45,0,.55,1) infinite; }
      .lbl-defl { animation: ld 10s cubic-bezier(.45,0,.55,1) infinite; opacity: 0; }
      .lbl-part { animation: lp 10s cubic-bezier(.45,0,.55,1) infinite; opacity: 0; }
      @keyframes lf {
        0%,18%,82%,100% { opacity: 1; }
        35%,65%         { opacity: 0; }
      }
      @keyframes ld {
        0%,22%   { opacity: 0; }
        35%      { opacity: 1; }
        48%,100% { opacity: 0; }
      }
      @keyframes lp {
        0%,47%   { opacity: 0; }
        65%      { opacity: 1; }
        78%,100% { opacity: 0; }
      }
    </style>

    <marker id="ah" viewBox="0 0 10 10" refX="8" refY="5"
            markerWidth="5" markerHeight="5" orient="auto">
      <path d="M2 2L8 5L2 8" fill="none" stroke="#58a6ff"
            stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- ════ BACKGROUND ════ -->
  <rect width="820" height="210" rx="14" fill="#0d1117"/>
  <rect x="0.5" y="0.5" width="819" height="209" rx="13.5"
        fill="none" stroke="#30363d" stroke-width="1"/>

  <!-- ════ LEFT PANEL — SKILL DOMAINS ════ -->
  <rect x="14" y="14" width="242" height="182" rx="8"
        fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="135" y="34" text-anchor="middle"
        font-size="9.5" font-weight="600" fill="#8b949e" letter-spacing="1">SKILL DOMAINS</text>
  <line x1="24"  y1="40" x2="246" y2="40" stroke="#21262d" stroke-width="1"/>

  <!-- atrophy threshold line -->
  <line x1="28"  y1="104" x2="246" y2="104"
        stroke="#f85149" stroke-width="0.75" stroke-dasharray="3 3" opacity="0.5"/>
  <text x="30" y="101" font-size="7" fill="#f85149" opacity="0.65">c* threshold</text>

  <!-- bar backgrounds -->
  <rect x="38"  y="48" width="54" height="80" rx="4" fill="#0d1117"/>
  <rect x="114" y="48" width="54" height="80" rx="4" fill="#0d1117"/>
  <rect x="190" y="48" width="54" height="80" rx="4" fill="#0d1117"/>

  <!-- animated bars -->
  <rect class="bar-a" x="38"  y="48" width="54" height="80" rx="4"/>
  <rect class="bar-p" x="114" y="48" width="54" height="80" rx="4"/>
  <rect class="bar-m" x="190" y="48" width="54" height="80" rx="4"/>

  <!-- bar labels -->
  <text x="65"  y="143" text-anchor="middle" font-size="8.5" fill="#8b949e">Arithmetic</text>
  <text x="141" y="143" text-anchor="middle" font-size="8.5" fill="#8b949e">Probability</text>
  <text x="217" y="143" text-anchor="middle" font-size="8.5" fill="#8b949e">Markov</text>

  <!-- caption -->
  <text x="135" y="182" text-anchor="middle"
        font-size="7.5" fill="#6e7681" font-style="italic">Latent capability ĉᵥ · EKF estimate</text>

  <!-- ════ ARROW: skills → APAI ════ -->
  <line x1="258" y1="99" x2="294" y2="99" class="flow-r" marker-end="url(#ah)"/>
  <text x="276" y="91" text-anchor="middle" font-size="7.5" fill="#58a6ff">signals</text>

  <!-- ════ CENTER PANEL — APAI MIDDLEWARE ════ -->
  <rect x="296" y="14" width="228" height="182" rx="8"
        fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="410" y="34" text-anchor="middle"
        font-size="9.5" font-weight="600" fill="#8b949e" letter-spacing="1">APAI MIDDLEWARE</text>
  <line x1="306" y1="40" x2="514" y2="40" stroke="#21262d" stroke-width="1"/>

  <!-- pulse rings -->
  <circle class="ring"        cx="410" cy="82" r="18"/>
  <circle class="ring ring2"  cx="410" cy="82" r="18"/>
  <circle class="ring ring3"  cx="410" cy="82" r="18"/>

  <!-- core dot -->
  <circle cx="410" cy="82" r="7"   fill="#1f6feb"/>
  <circle cx="410" cy="82" r="3.5" fill="#58a6ff"/>

  <!-- component stack -->
  <text x="410" y="116" text-anchor="middle" font-size="9" fill="#8b949e">EKF Capability Estimator</text>
  <text x="410" y="131" text-anchor="middle" font-size="9" fill="#8b949e">Optimal Assistance Policy</text>
  <text x="410" y="146" text-anchor="middle" font-size="9" fill="#8b949e">LLM Prompt Modulator</text>
  <text x="410" y="161" text-anchor="middle" font-size="9" fill="#8b949e">Prerequisite DAG Tracker</text>

  <text x="410" y="182" text-anchor="middle"
        font-size="7.5" fill="#6e7681" font-style="italic">Monitors · Estimates · Adapts</text>

  <!-- ════ ARROW: APAI → AI ════ -->
  <line x1="526" y1="99" x2="562" y2="99" class="flow-r" marker-end="url(#ah)"/>
  <text x="544" y="91" text-anchor="middle" font-size="7.5" fill="#58a6ff">policy</text>

  <!-- ════ RIGHT PANEL — AI ASSISTANCE ════ -->
  <rect x="564" y="14" width="242" height="182" rx="8"
        fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="685" y="34" text-anchor="middle"
        font-size="9.5" font-weight="600" fill="#8b949e" letter-spacing="1">AI ASSISTANCE</text>
  <line x1="574" y1="40" x2="796" y2="40" stroke="#21262d" stroke-width="1"/>

  <!-- level labels (left of bar) -->
  <text x="576" y="59"  font-size="8" fill="#f85149" opacity="0.8">Full Deferral</text>
  <text x="576" y="92"  font-size="8" fill="#d29922" opacity="0.8">Partial Help</text>
  <text x="576" y="125" font-size="8" fill="#3fb950" opacity="0.8">Full Assist.</text>

  <!-- dashed level lines across bar -->
  <line x1="650" y1="55"  x2="706" y2="55"  stroke="#f85149" stroke-width="0.5" stroke-dasharray="2 2" opacity="0.3"/>
  <line x1="650" y1="88"  x2="706" y2="88"  stroke="#d29922" stroke-width="0.5" stroke-dasharray="2 2" opacity="0.3"/>
  <line x1="650" y1="121" x2="706" y2="121" stroke="#3fb950" stroke-width="0.5" stroke-dasharray="2 2" opacity="0.3"/>

  <!-- bar background -->
  <rect x="652" y="48" width="50" height="80" rx="4" fill="#0d1117"/>

  <!-- animated assistance bar -->
  <rect class="bar-ai" x="652" y="48" width="50" height="80" rx="4"/>

  <!-- mode label (three overlapping texts, toggled by opacity) -->
  <text class="lbl-full" x="685" y="148" text-anchor="middle"
        font-size="9.5" fill="#3fb950">Full Assistance</text>
  <text class="lbl-defl" x="685" y="148" text-anchor="middle"
        font-size="9.5" fill="#f85149">Full Deferral</text>
  <text class="lbl-part" x="685" y="148" text-anchor="middle"
        font-size="9.5" fill="#d29922">Partial Help</text>

  <text x="685" y="163" text-anchor="middle"
        font-size="8.5" fill="#8b949e">system prompt modulated</text>
  <text x="685" y="177" text-anchor="middle"
        font-size="7.5" fill="#6e7681" font-style="italic">via Gemini 2.5 Flash API</text>
</svg>
