<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 265" width="820">
  <defs>
    <style>
      text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, sans-serif; }

      /* ── Node glow: each node breathes independently ── */
      .nd { fill: #0a1628; stroke: #1c3050; stroke-width: 1.2; }
      .nd0  { animation: ng 4.0s ease-in-out infinite; }
      .nd1  { animation: ng 3.5s ease-in-out infinite; animation-delay: -0.7s; }
      .nd2  { animation: ng 4.5s ease-in-out infinite; animation-delay: -1.3s; }
      .nd3  { animation: ng 3.8s ease-in-out infinite; animation-delay: -2.1s; }
      .nd4  { animation: ng 4.2s ease-in-out infinite; animation-delay: -0.4s; }
      .nd5  { animation: ng 3.6s ease-in-out infinite; animation-delay: -1.8s; }
      .nd6  { animation: ng 4.8s ease-in-out infinite; animation-delay: -0.9s; }
      .nd7  { animation: ng 3.4s ease-in-out infinite; animation-delay: -2.5s; }
      .nd8  { animation: ng 4.1s ease-in-out infinite; animation-delay: -1.1s; }
      .nd9  { animation: ng 3.7s ease-in-out infinite; animation-delay: -0.3s; }
      .nd10 { animation: ng 4.3s ease-in-out infinite; animation-delay: -1.6s; }
      .nd11 { animation: ng 3.9s ease-in-out infinite; animation-delay: -2.8s; }
      .nd12 { animation: ng 4.6s ease-in-out infinite; animation-delay: -0.6s; }
      .nd13 { animation: ng 3.3s ease-in-out infinite; animation-delay: -1.9s; }
      .nd14 { animation: ng 4.4s ease-in-out infinite; animation-delay: -1.2s; }
      @keyframes ng {
        0%,100% { fill: #0a1628; stroke: #1c3050; }
        50%     { fill: #0d2d6a; stroke: #58a6ff; }
      }

      /* ── State-block accent pulse ── */
      .sbp { animation: sbpa 4s ease-in-out infinite; }
      .sbp:nth-child(2) { animation-delay: -0.8s; }
      .sbp:nth-child(3) { animation-delay: -1.6s; }
      .sbp:nth-child(4) { animation-delay: -2.4s; }
      .sbp:nth-child(5) { animation-delay: -3.2s; }
      @keyframes sbpa { 0%,100%{ opacity:.25; } 50%{ opacity:.9; } }

      /* ── Overseer radar ── */
      .oc { fill: #071a07; stroke: #238636; stroke-width: 1.5;
            animation: ocp 3s ease-in-out infinite; }
      @keyframes ocp { 0%,100%{ stroke:#238636; } 50%{ stroke:#3fb950; } }
      .pr { fill: none; stroke: #3fb950; stroke-width: 1; opacity: 0; }
      .pr1 { animation: pring 3s ease-out infinite; }
      .pr2 { animation: pring 3s ease-out infinite; animation-delay: -1s; }
      .pr3 { animation: pring 3s ease-out infinite; animation-delay: -2s; }
      @keyframes pring { 0%{ r:14; opacity:.6; } 100%{ r:38; opacity:0; } }
      .sa { animation: sarot 5s linear infinite; transform-origin: 0 0; }
      @keyframes sarot { to { transform: rotate(360deg); } }

      /* ── Prompt bars cycling ── */
      .pba { animation: pbca 9s ease-in-out infinite; }
      .pbb { animation: pbca 9s ease-in-out infinite; animation-delay: -3s; }
      .pbc { animation: pbca 9s ease-in-out infinite; animation-delay: -6s; }
      @keyframes pbca {
        0%,20%   { opacity: .85; }
        30%,70%  { opacity: .08; }
        80%,100% { opacity: .85; }
      }

      /* ── Flow arrows ── */
      .flow { stroke-dasharray: 4 3; fill: none;
              animation: flowmo .8s linear infinite; }
      @keyframes flowmo { from{ stroke-dashoffset: 7; } to{ stroke-dashoffset: 0; } }
    </style>

    <marker id="arw" viewBox="0 0 8 8" refX="6" refY="4"
            markerWidth="5" markerHeight="5" orient="auto">
      <path d="M1 2L6 4L1 6" fill="none" stroke="#30363d"
            stroke-width="1.4" stroke-linecap="round"/>
    </marker>
    <marker id="arwb" viewBox="0 0 8 8" refX="6" refY="4"
            markerWidth="5" markerHeight="5" orient="auto">
      <path d="M1 2L6 4L1 6" fill="none" stroke="#58a6ff"
            stroke-width="1.4" stroke-linecap="round"/>
    </marker>
  </defs>

  <!-- ── Background ── -->
  <rect width="820" height="265" rx="12" fill="#0d1117"/>
  <rect x=".5" y=".5" width="819" height="264" rx="11.5"
        fill="none" stroke="#21262d" stroke-width="1"/>

  <!-- Vertical divider: graph | right panel -->
  <line x1="295" y1="14" x2="295" y2="251" stroke="#21262d" stroke-width="1"/>

  <!-- ══════════════ LEFT — SKILL GRAPH ══════════════ -->
  <text x="148" y="12" text-anchor="middle" font-size="7" letter-spacing="2"
        font-weight="600" fill="#484f58" font-family="monospace">SKILL GRAPH</text>

  <!-- Edges (layer 0 → 1) -->
  <line x1="95"  y1="30" x2="45"  y2="68" stroke="#21262d" stroke-width=".9"/>
  <line x1="95"  y1="30" x2="125" y2="68" stroke="#21262d" stroke-width=".9"/>
  <line x1="195" y1="30" x2="165" y2="68" stroke="#21262d" stroke-width=".9"/>
  <line x1="195" y1="30" x2="240" y2="68" stroke="#21262d" stroke-width=".9"/>

  <!-- Edges (layer 1 → 2) -->
  <line x1="45"  y1="75" x2="68"  y2="118" stroke="#21262d" stroke-width=".9"/>
  <line x1="125" y1="75" x2="68"  y2="118" stroke="#21262d" stroke-width=".9"/>
  <line x1="125" y1="75" x2="138" y2="118" stroke="#21262d" stroke-width=".9"/>
  <line x1="165" y1="75" x2="138" y2="118" stroke="#21262d" stroke-width=".9"/>
  <line x1="165" y1="75" x2="200" y2="118" stroke="#21262d" stroke-width=".9"/>
  <line x1="240" y1="75" x2="200" y2="118" stroke="#21262d" stroke-width=".9"/>
  <line x1="240" y1="75" x2="255" y2="118" stroke="#21262d" stroke-width=".9"/>

  <!-- Edges (layer 2 → 3) -->
  <line x1="68"  y1="125" x2="85"  y2="168" stroke="#21262d" stroke-width=".9"/>
  <line x1="138" y1="125" x2="85"  y2="168" stroke="#21262d" stroke-width=".9"/>
  <line x1="138" y1="125" x2="168" y2="168" stroke="#21262d" stroke-width=".9"/>
  <line x1="200" y1="125" x2="168" y2="168" stroke="#21262d" stroke-width=".9"/>
  <line x1="200" y1="125" x2="225" y2="168" stroke="#21262d" stroke-width=".9"/>
  <line x1="255" y1="125" x2="225" y2="168" stroke="#21262d" stroke-width=".9"/>

  <!-- Edges (layer 3 → 4) -->
  <line x1="85"  y1="175" x2="128" y2="212" stroke="#21262d" stroke-width=".9"/>
  <line x1="168" y1="175" x2="128" y2="212" stroke="#21262d" stroke-width=".9"/>
  <line x1="168" y1="175" x2="198" y2="212" stroke="#21262d" stroke-width=".9"/>
  <line x1="225" y1="175" x2="198" y2="212" stroke="#21262d" stroke-width=".9"/>

  <!-- Nodes layer 0 -->
  <circle class="nd nd0"  cx="95"  cy="28"  r="7"/>
  <circle class="nd nd1"  cx="195" cy="28"  r="7"/>
  <!-- Nodes layer 1 -->
  <circle class="nd nd2"  cx="45"  cy="71"  r="7"/>
  <circle class="nd nd3"  cx="125" cy="71"  r="7"/>
  <circle class="nd nd4"  cx="165" cy="71"  r="7"/>
  <circle class="nd nd5"  cx="240" cy="71"  r="7"/>
  <!-- Nodes layer 2 -->
  <circle class="nd nd6"  cx="68"  cy="121" r="7"/>
  <circle class="nd nd7"  cx="138" cy="121" r="7"/>
  <circle class="nd nd8"  cx="200" cy="121" r="7"/>
  <circle class="nd nd9"  cx="255" cy="121" r="7"/>
  <!-- Nodes layer 3 -->
  <circle class="nd nd10" cx="85"  cy="171" r="7"/>
  <circle class="nd nd11" cx="168" cy="171" r="7"/>
  <circle class="nd nd12" cx="225" cy="171" r="7"/>
  <!-- Nodes layer 4 -->
  <circle class="nd nd13" cx="128" cy="212" r="7"/>
  <circle class="nd nd14" cx="198" cy="212" r="7"/>

  <!-- ── Arrow: Skill Graph → State Block ── -->
  <line x1="281" y1="121" x2="302" y2="46"
        class="flow" stroke="#58a6ff" stroke-width="1.1" marker-end="url(#arwb)"/>

  <!-- ══════════════ RIGHT TOP — PERSISTENT STATE BLOCK ══════════════ -->
  <rect x="308" y="14" width="498" height="60" rx="8"
        fill="#0d1f3c" stroke="#1f3d6e" stroke-width="1"/>

  <!-- Pulsing accent dots -->
  <circle class="sbp" cx="335" cy="44" r="3.5" fill="#58a6ff"/>
  <circle class="sbp" cx="352" cy="44" r="3.5" fill="#58a6ff"/>
  <circle class="sbp" cx="369" cy="44" r="3.5" fill="#58a6ff"/>
  <circle class="sbp" cx="386" cy="44" r="3.5" fill="#58a6ff"/>
  <circle class="sbp" cx="403" cy="44" r="3.5" fill="#58a6ff"/>

  <text x="570" y="36" text-anchor="middle" font-size="11.5" font-weight="600"
        fill="#79c0ff">Persistent Human Cognitive State Tracking</text>
  <text x="570" y="56" text-anchor="middle" font-size="8" fill="#8b949e"
        letter-spacing=".5">continuous belief state · engagement · retention · drift</text>

  <!-- ── Arrows: State Block → Three modules ── -->
  <line x1="408" y1="74" x2="408" y2="86"
        class="flow" stroke="#30363d" stroke-width="1" marker-end="url(#arw)"/>
  <line x1="557" y1="74" x2="557" y2="86"
        class="flow" stroke="#30363d" stroke-width="1" marker-end="url(#arw)"/>
  <line x1="707" y1="74" x2="707" y2="86"
        class="flow" stroke="#30363d" stroke-width="1" marker-end="url(#arw)"/>

  <!-- Module separator lines -->
  <line x1="473" y1="78" x2="473" y2="240" stroke="#21262d" stroke-width=".5"/>
  <line x1="640" y1="78" x2="640" y2="240" stroke="#21262d" stroke-width=".5"/>

  <!-- ══════════════ MODULE 1 — OVERSEER AGENT ══════════════ -->
  <!-- Pulse rings -->
  <circle class="pr pr1" cx="408" cy="158" r="14"/>
  <circle class="pr pr2" cx="408" cy="158" r="14"/>
  <circle class="pr pr3" cx="408" cy="158" r="14"/>
  <!-- Core -->
  <circle class="oc" cx="408" cy="158" r="30"/>
  <!-- Scan arm -->
  <g transform="translate(408,158)">
    <g class="sa">
      <line x1="0" y1="0" x2="0" y2="-26"
            stroke="#3fb950" stroke-width="1" opacity=".5"/>
      <circle cx="0" cy="-23" r="2" fill="#3fb950" opacity=".8"/>
    </g>
  </g>
  <circle cx="408" cy="158" r="3.5" fill="#3fb950"/>
  <!-- Label -->
  <text x="408" y="203" text-anchor="middle" font-size="9.5"
        font-weight="600" fill="#e6edf3">Overseer Agent</text>
  <text x="408" y="217" text-anchor="middle" font-size="7.5"
        fill="#8b949e">monitors · tracks · infers</text>

  <!-- ══════════════ MODULE 2 — STATE ESTIMATOR ══════════════ -->
  <!-- Abstract Gaussian / belief curve -->
  <path d="M 487 175 Q 498 150 510 136 Q 520 126 557 122 Q 594 126 604 136 Q 616 150 627 175"
        fill="none" stroke="#58a6ff" stroke-width="1.4" opacity=".65"/>
  <!-- Shaded area under curve -->
  <path d="M 487 175 Q 498 150 510 136 Q 520 126 557 122 Q 594 126 604 136 Q 616 150 627 175 Z"
        fill="#58a6ff" fill-opacity=".06"/>
  <!-- Vertical centre line -->
  <line x1="557" y1="120" x2="557" y2="175"
        stroke="#58a6ff" stroke-width=".8" stroke-dasharray="3 2" opacity=".35"/>
  <!-- Peak dot -->
  <circle cx="557" cy="122" r="3" fill="#79c0ff" opacity=".9"/>
  <!-- Label -->
  <text x="557" y="203" text-anchor="middle" font-size="9.5"
        font-weight="600" fill="#e6edf3">State Estimator</text>
  <text x="557" y="217" text-anchor="middle" font-size="7.5"
        fill="#8b949e">approximates · updates · refines</text>

  <!-- ══════════════ MODULE 3 — PROMPT MODIFICATION ══════════════ -->
  <!-- Abstract document outline -->
  <rect x="650" y="95" width="114" height="82" rx="6"
        fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <!-- Three colored bar sets that cycle through green / red / amber -->
  <rect class="pba" x="661" y="106" width="90" height="7" rx="3" fill="#238636"/>
  <rect class="pba" x="661" y="117" width="68" height="7" rx="3" fill="#238636"/>
  <rect class="pbb" x="661" y="106" width="90" height="7" rx="3" fill="#da3633"/>
  <rect class="pbb" x="661" y="117" width="68" height="7" rx="3" fill="#da3633"/>
  <rect class="pbc" x="661" y="106" width="90" height="7" rx="3" fill="#b08800"/>
  <rect class="pbc" x="661" y="117" width="68" height="7" rx="3" fill="#b08800"/>
  <!-- Static neutral bars -->
  <rect x="661" y="130" width="55" height="5" rx="2.5" fill="#21262d"/>
  <rect x="661" y="139" width="78" height="5" rx="2.5" fill="#21262d"/>
  <rect x="661" y="148" width="62" height="5" rx="2.5" fill="#21262d"/>
  <rect x="661" y="157" width="42" height="5" rx="2.5" fill="#21262d"/>
  <!-- Label -->
  <text x="707" y="203" text-anchor="middle" font-size="9.5"
        font-weight="600" fill="#e6edf3">Prompt Modification</text>
  <text x="707" y="217" text-anchor="middle" font-size="7.5"
        fill="#8b949e">adapts · modulates · steers</text>

  <!-- ── Footer ── -->
  <text x="557" y="253" text-anchor="middle" font-size="7" fill="#30363d"
        font-family="monospace" letter-spacing=".5">APAI · Autonomy Preserving AI</text>
</svg>
